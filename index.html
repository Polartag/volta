<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>volta.codes — Maßgeschneiderte Software, entwickelt mit KI</title>
    <link rel="icon" href="data:,">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        :root {
            --white: #fafaf8;
            --dark: #14141a;
            --text: #3a3a3e;
            --text-mid: #48484c;
            --text-light: #70706e;
            --blue: #2b5ae0;
            --blue-bg: #2350c8;
            --line: rgba(20,20,26,0.09);
            --left-col: 240px;
            --col-gap: 4rem;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--white);
            color: var(--text);
            font-size: 15.5px;
            font-weight: 400;
            line-height: 1.72;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection { background: var(--blue); color: #fff; }

        p { color: var(--text-mid); margin-bottom: 1rem; }
        p:last-child { margin-bottom: 0; }

        a { color: var(--blue); text-decoration: none; transition: color 0.2s; }
        a:hover { color: var(--dark); }

        /* --- Highlights --- */
        mark {
            background: transparent; color: inherit;
            background-image: linear-gradient(var(--blue), var(--blue));
            background-size: 0% 100%; background-repeat: no-repeat;
            background-position: left;
            transition: background-size 0.8s ease, color 0.4s ease 0.2s;
            padding: 0.08em 0.15em; margin: -0.08em -0.15em; border-radius: 2px;
        }
        mark.lit { background-size: 100% 100%; color: #fff; }

        /* Mark-Variante für blaue Sektion: schwarzer Hintergrund */
        .fuerWen mark {
            background-image: linear-gradient(var(--dark), var(--dark));
        }

        /* Mark-Variante für dunkle Sektion: beige Highlight, dunkler Text */
        .wieWirArbeiten mark {
            background-image: linear-gradient(var(--white), var(--white));
        }
        .wieWirArbeiten mark.lit { color: var(--dark); }

        /* --- Nav --- */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 1.1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.3s, backdrop-filter 0.3s, box-shadow 0.3s;
        }
        nav.scrolled {
            background: rgba(250,250,248,0.9);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 1px 0 var(--line);
        }
        nav.scrolled.nav-dark {
            background: rgba(20,20,26,0.85);
            box-shadow: 0 1px 0 rgba(255,255,255,0.08);
        }
        nav .logo {
            font-weight: 600; font-size: 0.9rem;
            letter-spacing: 0.02em; color: var(--dark); transition: color 0.3s;
        }
        nav .nav-link {
            font-size: 0.75rem; font-weight: 500; letter-spacing: 0.07em;
            text-transform: uppercase; color: var(--text-light); transition: color 0.3s;
        }
        nav .nav-link:hover { color: var(--blue); }
        nav.nav-dark .logo { color: #fff; }
        nav.nav-dark .nav-link { color: rgba(255,255,255,0.6); }
        nav.nav-dark .nav-link:hover { color: #fff; }

        /* --- Layout --- */
        .w { max-width: 980px; margin: 0 auto; padding: 0 2rem; }
        section { padding: clamp(64px, 10vh, 100px) 0; }
        .fade { opacity: 0; transform: translateY(14px); transition: opacity 0.55s ease, transform 0.55s ease; }
        .fade.visible { opacity: 1; transform: none; }

        /* --- Split layout --- */
        .split { display: grid; grid-template-columns: var(--left-col) 1fr; gap: 0 var(--col-gap); }
        .split .s-head {
            margin-bottom: 0; padding-top: 0.2rem;
            position: sticky; top: 3.5rem; align-self: start;
        }

        /* --- Hero --- */
        .hero {
            padding-top: clamp(100px, 18vh, 200px);
            padding-bottom: clamp(40px, 6vh, 64px);
            background:
                radial-gradient(ellipse 70% 50% at 90% 5%, rgba(43,90,224,0.07) 0%, transparent 65%),
                var(--white);
        }
        .hero h1 {
            font-size: clamp(3rem, 9.5vw, 8.5rem);
            font-weight: 400; letter-spacing: 0.14em;
            text-transform: uppercase; line-height: 1;
            margin-bottom: 1.6rem; color: var(--dark);
        }
        @keyframes dot-breathe {
            0%, 100% { color: #2b5ae0; }
            50%       { color: #5b83f5; }
        }
        .hero h1 .dot {
            color: var(--blue);
            animation: dot-breathe 3s ease-in-out infinite;
        }
        .logo-dot {
            color: var(--blue);
            animation: dot-breathe 3s ease-in-out infinite;
        }
        nav.nav-dark .logo-dot { color: var(--blue); }
        .hero h1 .tld {
            font-size: clamp(0.8rem, 0.265em, 2.3rem);
            letter-spacing: 0.14em; font-weight: 400;
            color: var(--dark); margin-left: -0.1em;
        }
        .hero .sub {
            font-size: clamp(1.05rem, 1.8vw, 1.28rem);
            font-weight: 300; color: var(--text);
            line-height: 1.6; max-width: 640px;
        }

        /* --- Section heads --- */
        .s-head {
            font-size: clamp(1.6rem, 3vw, 2.4rem);
            font-weight: 600; letter-spacing: -0.02em;
            line-height: 1.15; margin-bottom: 1.2rem; color: var(--dark);
        }

        /* --- Lead paragraphs (first p in text sections) --- */
        .col p { line-height: 1.82; }
        .lead-p {
            font-size: 1rem; font-weight: 500;
            color: var(--dark); line-height: 1.72;
        }
        .section-lead {
            font-size: 1rem; font-weight: 500;
            color: var(--dark); line-height: 1.68;
            margin-bottom: 1.2rem;
        }

        /* --- Für wen (blue) --- */
        .fuerWen { background: var(--blue-bg); color: #fff; }
        .fuerWen .s-head {
            color: #fff; margin-bottom: 0; padding-top: 0.2rem;
            position: sticky; top: 3.5rem; align-self: start;
        }
        .gruppe-list { border-top: 1px solid rgba(255,255,255,0.15); }
        .gruppe {
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding: 2.2rem 0;
        }
        .gruppe-titel {
            font-size: 1.05rem; font-weight: 600;
            color: #fff; letter-spacing: -0.01em;
            line-height: 1.25; margin-bottom: 0.65rem;
        }
        .fuerWen p { color: rgba(255,255,255,0.82); font-size: 0.91rem; line-height: 1.8; margin-bottom: 0; }

        /* --- Was wir machen (light) --- */
        .phase-list { border-top: 1px solid var(--line); margin-top: 1.6rem; counter-reset: phase; }
        .phase {
            border-bottom: 1px solid var(--line);
            padding: 2rem 0;
            counter-increment: phase;
        }
        .phase::before {
            content: "0" counter(phase);
            display: block; font-size: 0.6rem; font-weight: 700;
            letter-spacing: 0.18em; color: var(--blue);
            margin-bottom: 0.55rem;
        }
        .phase h3 {
            font-size: 0.88rem; font-weight: 600;
            letter-spacing: 0.05em; text-transform: uppercase;
            color: var(--dark); margin-bottom: 0.6rem;
        }
        .phase p { font-size: 0.91rem; line-height: 1.8; }
        .ki-agenten {
            margin-top: 1.8rem; padding: 1.1rem 0 0 1.1rem;
            border-left: 2px solid rgba(43,90,224,0.35);
            font-size: 0.91rem;
        }

        /* --- Wie wir arbeiten (dark) --- */
        .wieWirArbeiten { background: var(--dark); color: #fff; }
        .wieWirArbeiten .s-head {
            color: #fff; margin-bottom: 0; padding-top: 0.2rem;
            position: sticky; top: 3.5rem; align-self: start;
        }
        .wert-list { border-top: 1px solid rgba(255,255,255,0.1); counter-reset: wert; }
        .wert {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 2rem 0;
            counter-increment: wert;
        }
        .wert::before {
            content: "0" counter(wert);
            display: block; font-size: 0.6rem; font-weight: 700;
            letter-spacing: 0.18em; color: rgba(255,255,255,0.28);
            margin-bottom: 0.55rem;
        }
        .wert h3 {
            font-size: 0.88rem; font-weight: 600;
            letter-spacing: 0.05em; text-transform: uppercase;
            color: rgba(255,255,255,0.9); margin-bottom: 0.6rem;
        }
        .wert p { color: rgba(255,255,255,0.72); font-size: 0.91rem; line-height: 1.8; margin-bottom: 0; }

        /* --- Was unsere Software auszeichnet (light) --- */
        .merkmal-intro {
            font-size: 1rem; font-weight: 500;
            color: var(--dark); line-height: 1.65;
        }
        .merkmal-list { border-top: 1px solid var(--line); margin-top: 1.6rem; counter-reset: merkmal; }
        .merkmal {
            border-bottom: 1px solid var(--line);
            padding: 2rem 0;
            counter-increment: merkmal;
        }
        .merkmal::before {
            content: "0" counter(merkmal);
            display: block; font-size: 0.6rem; font-weight: 700;
            letter-spacing: 0.18em; color: var(--blue);
            margin-bottom: 0.55rem;
        }
        .merkmal h3 {
            font-size: 0.88rem; font-weight: 600;
            letter-spacing: 0.05em; text-transform: uppercase;
            color: var(--dark); margin-bottom: 0.6rem;
        }
        .merkmal p { font-size: 0.91rem; line-height: 1.8; }

        /* --- Kontakt --- */
        .kontakt { background: var(--dark); color: #fff; padding: clamp(56px, 10vh, 100px) 0 0; }
        .kontakt .s-head { color: #fff; position: static; }
        .kontakt p { color: rgba(255,255,255,0.7); }
        .kontakt .email-wrap { margin-top: 0.5rem; margin-bottom: 1.2rem; }
        .kontakt .kontakt-meta { font-size: 0.82rem; color: rgba(255,255,255,0.4); line-height: 1.65; }
        .kontakt .email {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 600; letter-spacing: -0.01em;
            color: #fff; display: inline-block; position: relative;
        }
        .kontakt .email::after {
            content: ''; position: absolute; bottom: -2px; left: 0;
            width: 0; height: 2px; background: var(--blue);
            transition: width 0.35s ease;
        }
        .kontakt .email:hover { color: var(--blue); }
        .kontakt .email:hover::after { width: 100%; }

        /* --- Impressum Modal --- */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 200;
            background: rgba(14,14,20,0.72); backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            align-items: center; justify-content: center; padding: 2rem;
        }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--white); max-width: 480px; width: 100%; padding: 2.4rem 2.6rem; position: relative; border-radius: 2px; }
        .modal h2 { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; color: var(--dark); margin-bottom: 1.4rem; }
        .modal p { font-size: 0.82rem; color: var(--text-mid); line-height: 1.75; margin-bottom: 0.65rem; }
        .modal a { color: var(--blue); }
        .modal-close { position: absolute; top: 1.1rem; right: 1.3rem; background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 1.25rem; line-height: 1; padding: 0.25rem; transition: color 0.2s; }
        .modal-close:hover { color: var(--dark); }

        .copy { margin-top: clamp(40px, 6vh, 64px); padding: 1.2rem 0; border-top: 1px solid rgba(255,255,255,0.08); font-size: 0.72rem; color: rgba(255,255,255,0.25); letter-spacing: 0.02em; }
        .imprint-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.25); font: inherit; font-size: 0.72rem; letter-spacing: 0.02em; padding: 0; transition: color 0.2s; }
        .imprint-btn:hover { color: rgba(255,255,255,0.5); }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            :root { --left-col: 0px; --col-gap: 0rem; }
            nav { padding: 1rem 1.2rem; }
            .w { padding: 0 1.2rem; }
            section { padding: clamp(48px, 7vh, 80px) 0; }
            .kontakt { padding-bottom: 0; }
            .hero { padding-top: 120px; }
            .hero h1 { letter-spacing: 0.08em; }
            .split { grid-template-columns: 1fr; gap: 0.6rem; }
            .split .s-head { position: static; padding-top: 0; }
            .fuerWen .s-head { position: static; }
            .wieWirArbeiten .s-head { position: static; }
            .phase::after, .wert::after, .merkmal::after { font-size: 5.5rem; }
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 2.2rem; letter-spacing: 0.06em; }
        }
    </style>
</head>
<body>

<nav>
    <span class="logo">volta<span class="logo-dot">.</span>codes</span>
    <a href="#kontakt" class="nav-link" id="nav-kontakt">Kontakt</a>
</nav>

<!-- 1. Hero -->
<section class="hero">
    <div class="w">
        <div class="fade">
            <h1>volta<span class="dot">.</span><span class="tld">codes</span></h1>
            <p class="sub" id="hero-sub"></p>
        </div>
    </div>
</section>

<!-- 2. Warum volta.codes (hell) -->
<section class="warum">
    <div class="w">
        <div class="fade split">
            <h2 class="s-head" id="warum-head">Warum volta.codes</h2>
            <div class="col" id="warum-col"></div>
        </div>
    </div>
</section>

<!-- 3. Für wen wir bauen (blau) -->
<section class="fuerWen">
    <div class="w">
        <div class="fade split">
            <h2 class="s-head" id="fuerWen-head">Für wen wir bauen</h2>
            <div id="fuerWen-col"></div>
        </div>
    </div>
</section>

<!-- 4. Was wir machen (hell) -->
<section class="wasWirMachen">
    <div class="w">
        <div class="fade split">
            <h2 class="s-head" id="wasWirMachen-head">Was wir machen</h2>
            <div class="col" id="wasWirMachen-col"></div>
        </div>
    </div>
</section>

<!-- 5. Wie wir arbeiten (dunkel) -->
<section class="wieWirArbeiten">
    <div class="w">
        <div class="fade split">
            <h2 class="s-head" id="wieWirArbeiten-head">Wie wir arbeiten</h2>
            <div id="wieWirArbeiten-col"></div>
        </div>
    </div>
</section>

<!-- 6. Was unsere Software auszeichnet (hell) -->
<section class="wasUnsereSoftwareAuszeichnet">
    <div class="w">
        <div class="fade split">
            <h2 class="s-head" id="wasUnsereSoftwareAuszeichnet-head">Was unsere Software auszeichnet</h2>
            <div class="col" id="wasUnsereSoftwareAuszeichnet-col"></div>
        </div>
    </div>
</section>

<!-- 7. Die Gründer (hell) -->
<section class="team">
    <div class="w">
        <div class="fade split">
            <h2 class="s-head" id="gruender-head">Die Gründer</h2>
            <div class="col" id="gruender-col"></div>
        </div>
    </div>
</section>

<!-- 8. Kontakt (dunkel) -->
<section class="kontakt" id="kontakt">
    <div class="w">
        <div class="fade split">
            <h2 class="s-head" id="kontakt-head">Sprechen wir.</h2>
            <div>
                <p id="kontakt-text"></p>
                <p class="email-wrap"><a id="kontakt-email" href="mailto:hallo@volta.codes" class="email">hallo@volta.codes</a></p>
                <p class="kontakt-meta" id="kontakt-meta"></p>
            </div>
        </div>
        <p class="copy">&copy; 2026 volta.codes — Berlin &ensp;&middot;&ensp; <button class="imprint-btn" id="imprint-open">Impressum</button></p>
    </div>
</section>

<div class="modal-overlay" id="imprint-modal">
    <div class="modal">
        <button class="modal-close" id="imprint-close" aria-label="Schließen">&times;</button>
        <div id="imprint-content"></div>
    </div>
</div>

<script>
const n = document.querySelector('nav');
const updateScroll = () => n.classList.toggle('scrolled', scrollY > 40);
addEventListener('scroll', updateScroll, { passive: true });
updateScroll();

const imprintModal = document.getElementById('imprint-modal');
document.getElementById('imprint-open').addEventListener('click', () => imprintModal.classList.add('open'));
document.getElementById('imprint-close').addEventListener('click', () => imprintModal.classList.remove('open'));
imprintModal.addEventListener('click', e => { if (e.target === imprintModal) imprintModal.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') imprintModal.classList.remove('open'); });

function md(s) {
    return s
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/==(.*?)==/g, '<mark>$1</mark>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
}

function ps(arr) {
    return arr.map(t => `<p>${md(t)}</p>`).join('');
}

async function init() {
    const raw = await fetch('./content/site.json').then(r => r.text());
    const d = JSON.parse(raw.replace(/,\s*([}\]])/g, '$1'));

    const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };

    setText('nav-kontakt', d.nav.kontaktLabel);
    document.getElementById('hero-sub').innerHTML = md(d.hero.untertitel);
    setText('warum-head', d.warum.heading);
    setText('fuerWen-head', d.fuerWen.heading);
    setText('wasWirMachen-head', d.wasWirMachen.heading);
    setText('wieWirArbeiten-head', d.wieWirArbeiten.heading);
    setText('wasUnsereSoftwareAuszeichnet-head', d.wasUnsereSoftwareAuszeichnet.heading);
    setText('gruender-head', d.gruender.heading);
    setText('kontakt-head', d.kontakt.heading);

    const imp = d.impressum;
    document.getElementById('imprint-content').innerHTML =
        `<h2>${imp.heading}</h2>
         <p>${imp.firma}<br>${imp.adresse.replace(/\n/g, '<br>')}</p>
         <p>${imp.geschaeftsfuehrer}</p>
         <p><a href="mailto:${imp.email}">${imp.email}</a></p>`;

    document.getElementById('warum-col').innerHTML =
        d.warum.absaetze.map((t, i) =>
            `<p${i === 0 ? ' class="lead-p"' : ''}>${md(t)}</p>`
        ).join('');

    document.getElementById('fuerWen-col').innerHTML =
        '<div class="gruppe-list">' +
        d.fuerWen.gruppen.map(g =>
            `<div class="gruppe"><h3 class="gruppe-titel">${md(g.titel)}</h3><p>${md(g.text)}</p></div>`
        ).join('') +
        '</div>';

    document.getElementById('wasWirMachen-col').innerHTML =
        d.wasWirMachen.intro.map((t, i) =>
            `<p${i === 0 ? ' class="section-lead"' : ''}>${md(t)}</p>`
        ).join('') +
        '<div class="phase-list">' +
        d.wasWirMachen.phasen.map(p =>
            `<div class="phase"><h3>${md(p.titel)}</h3><p>${md(p.text)}</p></div>`
        ).join('') +
        '</div>' +
        (d.wasWirMachen.kiAgenten ? `<p class="ki-agenten">${md(d.wasWirMachen.kiAgenten)}</p>` : '');

    document.getElementById('wieWirArbeiten-col').innerHTML =
        '<div class="wert-list">' +
        d.wieWirArbeiten.werte.map(w =>
            `<div class="wert"><h3>${md(w.titel)}</h3><p>${md(w.text)}</p></div>`
        ).join('') +
        '</div>';

    document.getElementById('wasUnsereSoftwareAuszeichnet-col').innerHTML =
        `<p class="merkmal-intro">${md(d.wasUnsereSoftwareAuszeichnet.intro)}</p>` +
        '<div class="merkmal-list">' +
        d.wasUnsereSoftwareAuszeichnet.merkmale.map(m =>
            `<div class="merkmal"><h3>${md(m.titel)}</h3><p>${md(m.text)}</p></div>`
        ).join('') +
        '</div>';

    document.getElementById('gruender-col').innerHTML =
        d.gruender.absaetze.map((t, i) =>
            `<p${i === 0 ? ' class="lead-p"' : ''}>${md(t)}</p>`
        ).join('');

    document.getElementById('kontakt-text').innerHTML = md(d.kontakt.text);
    const emailEl = document.getElementById('kontakt-email');
    emailEl.href = `mailto:${d.kontakt.email}`;
    emailEl.textContent = d.kontakt.email;
    document.getElementById('kontakt-meta').innerHTML = d.kontakt.meta.replace(/\n/g, '<br>');

    const fadeObs = new IntersectionObserver(es => {
        es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.fade').forEach(el => fadeObs.observe(el));
    document.querySelector('.hero .fade').classList.add('visible');

    // Highlights: bei Sektionswechsel 2 zufällige Marks neu wählen
    const sectionMarkMap = new Map();
    document.querySelectorAll('section').forEach(section => {
        const marks = Array.from(section.querySelectorAll('mark'));
        if (marks.length > 0) sectionMarkMap.set(section, marks);
    });

    const litSections = new Set();
    function updateHighlights() {
        const scrollY = window.scrollY;
        const viewBottom = scrollY + window.innerHeight;
        const mid = scrollY + window.innerHeight * 0.5;

        sectionMarkMap.forEach((marks, section) => {
            const sTop = section.offsetTop;
            const sBottom = sTop + section.offsetHeight;

            if (sBottom < scrollY || sTop > viewBottom) {
                // Komplett außerhalb: Marks entfernen, Reset für nächsten Besuch
                if (litSections.has(section)) {
                    marks.forEach(m => m.classList.remove('lit'));
                    litSections.delete(section);
                }
            } else if (mid >= sTop && mid < sBottom && !litSections.has(section)) {
                // Mittelpunkt erreicht Sektion erstmals: 2 zufällige Marks zeigen
                marks.slice().sort(() => Math.random() - 0.5).slice(0, 2)
                    .forEach(m => m.classList.add('lit'));
                litSections.add(section);
            }
        });
    }
    addEventListener('scroll', updateHighlights, { passive: true });
    updateHighlights();

    const darkSections = document.querySelectorAll('.fuerWen, .wieWirArbeiten, .kontakt');
    const navObs = new IntersectionObserver(es => {
        es.forEach(e => { e.target._navDark = e.isIntersecting; });
        n.classList.toggle('nav-dark', [...darkSections].some(s => s._navDark));
    }, { rootMargin: '0px 0px -94% 0px' });
    darkSections.forEach(s => navObs.observe(s));
}

init();
</script>

</body>
</html>
